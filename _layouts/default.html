<!DOCTYPE html>

      /* Reset & basic styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        color: #333;
        line-height: 1.6;
      }

      header {
        background-color: #2c3e50;
        color: #fff;
        padding: 1rem;
        text-align: center;
      }

      nav {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin: 1rem 0;
      }

      nav a {
        text-decoration: ;
        color: #2c3e50;
        font-weight: bold;
      }

      main {
        max-width: 900px;
        margin: auto;
        padding: 1rem;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      }

      h1, h2, h3, h4, h5, h6 {
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
        color: #2c3e50;
      }

      h1 { font-size: 2em; }
      h2 { font-size: 1.5em; }
      h3 { font-size: 1.3em; }

      p, ul, ol, blockquote, pre {
        margin-bottom: 1rem;
      }

      code {
        background-color: #f4f4f4;
        padding: 2px 6px;
        border-radius: 3px;
        font-family: 'Courier New', monospace;
        font-size: 0.9em;
      }

      pre {
        background-color: #f4f4f4;
        padding: 1rem;
        border-radius: 5px;
        overflow-x: auto;
      }

      pre code {
        background: none;
        padding: 0;
      }

      blockquote {
        border-left: 4px solid #2c3e50;
        padding-left: 1rem;
        color: #666;
        font-style: italic;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 1rem;
      }

      table th, table td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }

      table th {
        background-color: #2c3e50;
        color: white;
      }

      table tr:nth-child(even) {
        background-color: #f9f9f9;
      }

      img {
        max-width: 100%;
        height: auto;
      }

      a {
        color: #2980b9;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      hr {
        border: none;
        border-top: 2px solid #ddd;
        margin: 2rem 0;
      }

      footer {
        text-align: center;
        padding: 1rem;
        background-color: #2c3e50;
        color: #fff;
        margin-top: 2rem;
      }

      /* Task list styles */
      ul li input[type="checkbox"] {
